name: Build iSH Linux IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout iSH Repository
        uses: actions/checkout@v4
        with:
          repository: ish-app/ish          # অথবা তোমার ফর্ক করা username/ish
          submodules: recursive
          fetch-depth: 0

      - name: Verify Project Files
        run: |
          ls -la
          echo "✅ iSH.xcodeproj exists: $(ls iSH.xcodeproj 2>/dev/null && echo Yes || echo No)"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install Dependencies
        run: brew install meson ninja libarchive

      - name: Prepare Alpine rootfs
        run: |
          mkdir -p $RUNNER_TEMP/alpine
          curl -L -o /tmp/alpine.tar.gz \
            https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-minirootfs-3.20.3-x86_64.tar.gz
          sudo tar -xzf /tmp/alpine.tar.gz -C $RUNNER_TEMP/alpine

      - name: Build & Archive IPA
        run: |
          xcodebuild clean archive \
            -project iSH.xcodeproj \
            -scheme iSH \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/output"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iSH-Linux-IPA
          path: ${{ runner.temp }}/output/*.ipa
