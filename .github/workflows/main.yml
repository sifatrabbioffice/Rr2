# ============================================================
# GitHub Actions — iOS IPA Builder
# Target : iPhone 15 Pro Max (iOS 17+)
# Xcode   : 15.x  (auto-selected on macos-14 runner)
# NOTE: iOS builds REQUIRE macOS + Xcode.
#       Linux cannot compile IPA files.
# ============================================================
#
# REQUIRED SECRETS (add in Repo → Settings → Secrets → Actions):
#
#   APPLE_CERTIFICATE_BASE64   → base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD → password for the .p12 file
#   APPLE_PROVISIONING_PROFILE → base64-encoded .mobileprovision file
#   APPLE_TEAM_ID              → your 10-char Apple Team ID
#   KEYCHAIN_PASSWORD          → any strong password (used locally)
#
# HOW TO BASE64-ENCODE YOUR FILES (run on your Mac):
#   base64 -i Certificates.p12 | pbcopy
#   base64 -i YourApp.mobileprovision | pbcopy
# ============================================================

name: Build IPA — iPhone 15 Pro Max

on:
  push:
    branches: [main, master, release/**]
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # allows manual trigger from GitHub UI

# ── global env vars ────────────────────────────────────────
env:
  SCHEME:           "YourApp"               # ← change to your scheme name
  PROJECT:          "YourApp.xcodeproj"     # ← or "YourApp.xcworkspace" if using CocoaPods
  BUNDLE_ID:        "com.yourcompany.app"   # ← your app Bundle Identifier
  IOS_VERSION:      "17.0"
  DEVICE:           "iPhone 15 Pro Max"
  EXPORT_METHOD:    "ad-hoc"               # options: ad-hoc | app-store | enterprise | development
  BUILD_DIR:        "${{ github.workspace }}/build"
  ARCHIVE_PATH:     "${{ github.workspace }}/build/YourApp.xcarchive"
  IPA_OUTPUT_DIR:   "${{ github.workspace }}/build/ipa"
  KEYCHAIN_NAME:    "ios-build.keychain"

# ── jobs ───────────────────────────────────────────────────
jobs:
  build-ipa:
    name: 🏗 Build & Export IPA
    runs-on: macos-14            # macOS 14 Sonoma — ships with Xcode 15 (required for iOS 17)

    steps:
    # ── 1. Checkout source code ────────────────────────────
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive    # pulls submodules if any

    # ── 2. Select Xcode version ────────────────────────────
    - name: 🛠 Select Xcode 15
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "15.4"   # latest Xcode 15 stable; supports iPhone 15 Pro Max

    # ── 3. Print environment info ──────────────────────────
    - name: ℹ️  Environment info
      run: |
        echo "Xcode:   $(xcodebuild -version)"
        echo "Swift:   $(swift --version)"
        echo "macOS:   $(sw_vers -productVersion)"
        echo "Runner:  $(uname -m)"

    # ── 4. Cache CocoaPods (skip if not using pods) ────────
    - name: 💾 Cache CocoaPods
      uses: actions/cache@v4
      with:
        path: Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    # ── 5. Install CocoaPods dependencies (if Podfile exists)
    - name: 📦 Install CocoaPods
      run: |
        if [ -f "Podfile" ]; then
          echo "Podfile found — installing pods..."
          sudo gem install cocoapods --no-document
          pod install --repo-update
          echo "PROJECT=YourApp.xcworkspace" >> $GITHUB_ENV
        else
          echo "No Podfile — skipping CocoaPods."
        fi

    # ── 6. Install Apple certificate into keychain ─────────
    - name: 🔐 Import signing certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Decode certificate
        CERT_PATH=$RUNNER_TEMP/build_certificate.p12
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

        # Create a temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

        # Import certificate into keychain
        security import "$CERT_PATH" \
          -k "$KEYCHAIN_NAME" \
          -P "$CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productbuild

        # Allow codesign to access keychain without UI prompt
        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s -k "$KEYCHAIN_PASSWORD" \
          "$KEYCHAIN_NAME"

        # Add keychain to search list
        security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain

    # ── 7. Install provisioning profile ───────────────────
    - name: 📋 Install provisioning profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      run: |
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

        # Copy to Xcode's provisioning profiles folder
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PP_UUID=$(security cms -D -i "$PP_PATH" \
                  | plutil -extract UUID raw -)
        cp "$PP_PATH" \
           ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
        echo "Installed profile UUID: $PP_UUID"

    # ── 8. Resolve Swift Package Manager dependencies ──────
    - name: 📦 Resolve Swift packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -scheme "$SCHEME" \
          -project "$PROJECT" \
          | xcpretty || true   # non-fatal if xcworkspace used

    # ── 9. Build & archive ─────────────────────────────────
    - name: 🔨 Build archive
      run: |
        mkdir -p "$BUILD_DIR"

        xcodebuild archive \
          -scheme "$SCHEME" \
          -project "$PROJECT" \
          -archivePath "$ARCHIVE_PATH" \
          -destination "generic/platform=iOS" \
          -configuration Release \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          IPHONEOS_DEPLOYMENT_TARGET="$IOS_VERSION" \
          OTHER_SWIFT_FLAGS="-DRELEASE" \
          COMPILER_INDEX_STORE_ENABLE=NO \
          | xcpretty --color

    # ── 10. Generate ExportOptions.plist ──────────────────
    - name: 📝 Generate ExportOptions.plist
      env:
        TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>${EXPORT_METHOD}</string>
          <key>teamID</key>
          <string>${TEAM_ID}</string>
          <key>compileBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <true/>
          <key>thinning</key>
          <string>&lt;none&gt;</string>
          <key>destination</key>
          <string>export</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>stripSwiftSymbols</key>
          <true/>
        </dict>
        </plist>
        EOF
        echo "ExportOptions.plist:"
        cat "$RUNNER_TEMP/ExportOptions.plist"

    # ── 11. Export IPA ─────────────────────────────────────
    - name: 📤 Export IPA
      run: |
        mkdir -p "$IPA_OUTPUT_DIR"

        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE_PATH" \
          -exportPath "$IPA_OUTPUT_DIR" \
          -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
          | xcpretty --color

        # Verify IPA was created
        IPA_FILE=$(find "$IPA_OUTPUT_DIR" -name "*.ipa" | head -1)
        if [ -z "$IPA_FILE" ]; then
          echo "❌ ERROR: IPA file not found!"
          exit 1
        fi
        echo "✅ IPA created: $IPA_FILE"
        echo "IPA_PATH=$IPA_FILE" >> $GITHUB_ENV

    # ── 12. Show IPA info ──────────────────────────────────
    - name: 🔍 IPA details
      run: |
        echo "File: $IPA_PATH"
        echo "Size: $(du -sh "$IPA_PATH" | cut -f1)"
        ls -lh "$IPA_OUTPUT_DIR"

    # ── 13. Upload IPA as artifact ────────────────────────
    - name: 📦 Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourApp-IPA-${{ github.run_number }}
        path: ${{ env.IPA_OUTPUT_DIR }}/*.ipa
        retention-days: 30
        if-no-files-found: error

    # ── 14. Upload dSYM for crash reporting (optional) ────
    - name: 📦 Upload dSYM artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourApp-dSYM-${{ github.run_number }}
        path: ${{ env.ARCHIVE_PATH }}/dSYMs/
        retention-days: 30
        if-no-files-found: warn

    # ── 15. Cleanup keychain ───────────────────────────────
    - name: 🧹 Cleanup keychain
      if: always()              # runs even if earlier steps fail
      run: |
        security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
        rm -f "$RUNNER_TEMP/build_certificate.p12" \
              "$RUNNER_TEMP/build_pp.mobileprovision" \
              "$RUNNER_TEMP/ExportOptions.plist"

  # ── Optional: Upload to TestFlight ─────────────────────
  upload-testflight:
    name: 🚀 Upload to TestFlight
    needs: build-ipa
    runs-on: macos-14
    # Remove the 'if' line below to always upload, or adjust branch condition
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 📥 Download IPA artifact
      uses: actions/download-artifact@v4
      with:
        name: YourApp-IPA-${{ github.run_number }}
        path: ./ipa

    - name: 🚀 Upload to TestFlight via altool
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}           # your Apple ID email
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}   # app-specific password from appleid.apple.com
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        IPA=$(find ./ipa -name "*.ipa" | head -1)
        echo "Uploading: $IPA"

        xcrun altool --upload-app \
          --type ios \
          --file "$IPA" \
          --apiKey "$APPLE_ID" \
          --apiIssuer "$APPLE_TEAM_ID" \
          --username "$APPLE_ID" \
          --password "$APP_PASSWORD" \
          --verbose
