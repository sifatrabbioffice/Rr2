name: Build Pro Linux Emulator IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # লেটেস্ট ম্যাক ওএস রানার
    steps:
      - name: Checkout UTM Source
        uses: actions/checkout@v4
        with:
          repository: 'utmapp/UTM'
          submodules: recursive
          fetch-depth: 1 # দ্রুত ডাউনলোডের জন্য

      - name: Install System Dependencies
        run: |
          brew install bison pkg-config glib pixman gettext
          echo "/usr/local/opt/bison/bin" >> $GITHUB_PATH

      - name: Cache Build Assets
        uses: actions/cache@v3
        with:
          path: |
            build/
            sysroot/
          key: ${{ runner.os }}-utm-v1

      - name: Pre-build Configuration
        run: |
          # JIT এবং সাইডলোডিং অপ্টিমাইজেশান
          ./scripts/build_dependencies.sh -a arm64

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -archivePath build/UTM.xcarchive \
            -scheme UTM \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_DESTINATION=yes

      - name: Create Satisfaction IPA
        run: |
          mkdir -p Payload
          cp -r build/UTM.xcarchive/Products/Applications/UTM.app Payload/
          # আইকন এবং মেটাডেটা ঠিক রাখার জন্য জিপিং
          zip -r9 LinuxPro.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Pro-Max-Edition
          path: LinuxPro.ipa
