name: Build Linux Emulator IPA for iOS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'utmapp/UTM'
          submodules: recursive

      - name: Cache Homebrew
        uses: actions/cache@v3
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
          key: ${{ runner.os }}-homebrew

      - name: Install Dependencies
        run: |
          brew install bison pkg-config glib pixman gettext

      - name: Setup Signing
        run: |
          # এখানে সিগনিং সার্টিফিকেট ছাড়াই বিল্ড করার কমান্ড দেওয়া হয়েছে
          # জেলব্রেক বা ট্রলস্টোর ইউজারদের জন্য এটি কাজ করবে
          echo "No signing identity specified, building for ad-hoc/TrollStore"

      - name: Build IPA
        run: |
          xcodebuild archive \
            -archivePath build/UTM.xcarchive \
            -scheme UTM \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -r build/UTM.xcarchive/Products/Applications/UTM.app Payload/
          zip -r LinuxEmulator.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Emulator-IPA
          path: LinuxEmulator.ipa
