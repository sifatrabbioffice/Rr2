name: 🐧 Build iLinux IPA — Alpine Linux on iPhone

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: iLinux
  BUNDLE_ID: com.ilinux.alpineterminal
  DEPLOYMENT_TARGET: "16.0"
  ALPINE_VERSION: "3.19.1"

jobs:
  build-ipa:
    name: 🔨 Build Linux IPA for iPhone
    runs-on: macos-14
    timeout-minutes: 60

    steps:

      # ─────────────────────────────────────────────
      # STEP 1: Checkout
      # ─────────────────────────────────────────────
      - name: ✅ Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # STEP 2: Select Xcode
      # ─────────────────────────────────────────────
      - name: 🛠 Select Xcode (latest available)
        run: |
          XCODE=$(ls /Applications | grep "^Xcode" | sort -V | tail -1)
          echo "Found: $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      # ─────────────────────────────────────────────
      # STEP 3: Install Ruby gem for project gen
      # ─────────────────────────────────────────────
      - name: 💎 Install xcodeproj gem
        run: |
          gem install xcodeproj --no-document
          gem install json --no-document

      # ─────────────────────────────────────────────
      # STEP 4: Create entire directory structure
      # ─────────────────────────────────────────────
      - name: 📁 Create Project Directory Structure
        run: |
          mkdir -p iLinux/iLinux/Sources
          mkdir -p iLinux/iLinux/Resources
          mkdir -p iLinux/iLinux/Assets.xcassets/AppIcon.appiconset
          mkdir -p iLinux/iLinux/Assets.xcassets/AccentColor.colorset
          mkdir -p iLinux/iLinux.xcodeproj
          echo "📁 Directory structure created"

      # ─────────────────────────────────────────────
      # STEP 5: Write ALL Swift source files
      # ─────────────────────────────────────────────
      - name: 📝 Generate Swift Source — iLinuxApp.swift
        run: |
          cat > iLinux/iLinux/Sources/iLinuxApp.swift << 'SWIFT_END'
          import SwiftUI

          @main
          struct iLinuxApp: App {
              @UIApplicationDelegateAdaptor(AppDelegate.self) var appDelegate

              var body: some Scene {
                  WindowGroup {
                      ContentView()
                          .preferredColorScheme(.dark)
                  }
              }
          }

          class AppDelegate: NSObject, UIApplicationDelegate {
              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]? = nil
              ) -> Bool {
                  // Keep screen on while terminal is active
                  UIApplication.shared.isIdleTimerDisabled = true
                  return true
              }
          }
          SWIFT_END

      - name: 📝 Generate Swift Source — ContentView.swift
        run: |
          cat > iLinux/iLinux/Sources/ContentView.swift << 'SWIFT_END'
          import SwiftUI

          struct ContentView: View {
              @StateObject private var session = ShellSession()
              @State private var showInfo = false

              var body: some View {
                  ZStack(alignment: .top) {
                      Color.black.ignoresSafeArea()

                      VStack(spacing: 0) {
                          // ── Title Bar ──
                          HStack(spacing: 8) {
                              HStack(spacing: 6) {
                                  Circle().fill(Color(red: 1, green: 0.37, blue: 0.34)).frame(width: 11, height: 11)
                                  Circle().fill(Color(red: 1, green: 0.73, blue: 0.11)).frame(width: 11, height: 11)
                                  Circle().fill(Color(red: 0.19, green: 0.8, blue: 0.35)).frame(width: 11, height: 11)
                              }
                              Spacer()
                              HStack(spacing: 4) {
                                  Image(systemName: "leaf.fill")
                                      .foregroundColor(.green)
                                      .font(.system(size: 11))
                                  Text("iLinux  —  Alpine 3.19  —  arm64")
                                      .font(.system(size: 11, weight: .medium, design: .monospaced))
                                      .foregroundColor(Color(white: 0.6))
                              }
                              Spacer()
                              Button(action: { showInfo.toggle() }) {
                                  Image(systemName: "info.circle")
                                      .foregroundColor(Color(white: 0.5))
                                      .font(.system(size: 13))
                              }
                          }
                          .padding(.horizontal, 12)
                          .padding(.vertical, 9)
                          .background(Color(white: 0.12))
                          .overlay(Divider().background(Color(white: 0.2)), alignment: .bottom)

                          // ── Terminal Output ──
                          TerminalOutputView(session: session)

                          // ── Toolbar ──
                          KeyboardToolbar(session: session)

                          // ── Input Bar ──
                          InputBarView(session: session)
                      }

                      // ── Info Overlay ──
                      if showInfo {
                          InfoOverlayView(show: $showInfo)
                      }
                  }
                  .onAppear {
                      session.start()
                  }
              }
          }

          struct InfoOverlayView: View {
              @Binding var show: Bool

              var body: some View {
                  VStack(spacing: 16) {
                      HStack {
                          Text("🐧 iLinux Info")
                              .font(.system(size: 15, weight: .bold, design: .monospaced))
                              .foregroundColor(.green)
                          Spacer()
                          Button("✕") { show = false }
                              .foregroundColor(.gray)
                      }

                      VStack(alignment: .leading, spacing: 8) {
                          infoRow("OS", "Alpine Linux 3.19.1")
                          infoRow("Arch", "arm64 (Apple Silicon)")
                          infoRow("Shell", "/bin/sh (ash)")
                          infoRow("Pkg Manager", "apk (if network)")
                          infoRow("Install", "Sideloaded via AltStore")
                          infoRow("Version", "iLinux 1.0.0")
                      }

                      Text("Commands: ls, cd, cat, echo, pwd, env, uname, ps, kill, mkdir, rm, cp, mv, chmod, grep, find, head, tail, wc, sort, uniq, cut, tr, sed, awk")
                          .font(.system(size: 10, design: .monospaced))
                          .foregroundColor(Color(white: 0.5))
                          .multilineTextAlignment(.leading)
                  }
                  .padding(20)
                  .background(Color(white: 0.1))
                  .cornerRadius(12)
                  .overlay(RoundedRectangle(cornerRadius: 12).stroke(Color.green.opacity(0.3), lineWidth: 1))
                  .padding(24)
                  .frame(maxWidth: .infinity, maxHeight: .infinity, alignment: .center)
                  .background(Color.black.opacity(0.7).ignoresSafeArea())
                  .onTapGesture { show = false }
              }

              func infoRow(_ key: String, _ value: String) -> some View {
                  HStack {
                      Text(key + ":")
                          .font(.system(size: 12, design: .monospaced))
                          .foregroundColor(Color(white: 0.5))
                          .frame(width: 90, alignment: .leading)
                      Text(value)
                          .font(.system(size: 12, weight: .medium, design: .monospaced))
                          .foregroundColor(.white)
                  }
              }
          }
          SWIFT_END

      - name: 📝 Generate Swift Source — TerminalOutputView.swift
        run: |
          cat > iLinux/iLinux/Sources/TerminalOutputView.swift << 'SWIFT_END'
          import SwiftUI

          struct TerminalOutputView: View {
              @ObservedObject var session: ShellSession

              var body: some View {
                  ScrollViewReader { proxy in
                      ScrollView(.vertical) {
                          LazyVStack(alignment: .leading, spacing: 0) {
                              ForEach(session.lines.indices, id: \.self) { idx in
                                  TerminalLineView(line: session.lines[idx])
                                      .id(idx)
                              }
                              // Invisible anchor at bottom
                              Color.clear.frame(height: 1).id("bottom")
                          }
                          .padding(.horizontal, 8)
                          .padding(.top, 6)
                          .padding(.bottom, 4)
                      }
                      .background(Color.black)
                      .onChange(of: session.lines.count) { _ in
                          withAnimation(.none) {
                              proxy.scrollTo("bottom", anchor: .bottom)
                          }
                      }
                  }
              }
          }

          struct TerminalLineView: View {
              let line: TerminalLine

              var body: some View {
                  Group {
                      if line.segments.isEmpty {
                          Text(" ")
                              .font(.system(size: 13, design: .monospaced))
                              .frame(maxWidth: .infinity, alignment: .leading)
                      } else {
                          line.segments.reduce(Text("")) { result, seg in
                              result + Text(seg.text)
                                  .foregroundColor(seg.color)
                                  .font(.system(size: 13,
                                               weight: seg.bold ? .bold : .regular,
                                               design: .monospaced))
                          }
                          .frame(maxWidth: .infinity, alignment: .leading)
                      }
                  }
                  .padding(.vertical, 0.5)
              }
          }
          SWIFT_END

      - name: 📝 Generate Swift Source — InputBarView.swift
        run: |
          cat > iLinux/iLinux/Sources/InputBarView.swift << 'SWIFT_END'
          import SwiftUI

          struct InputBarView: View {
              @ObservedObject var session: ShellSession
              @State private var inputText = ""
              @FocusState private var isFocused: Bool

              var body: some View {
                  HStack(spacing: 0) {
                      // Prompt indicator
                      Text(session.isRunning ? "▶ " : "$ ")
                          .font(.system(size: 14, weight: .bold, design: .monospaced))
                          .foregroundColor(session.isRunning ? .yellow : .green)
                          .padding(.leading, 10)

                      // Text field
                      TextField("", text: $inputText)
                          .font(.system(size: 14, design: .monospaced))
                          .foregroundColor(.white)
                          .tint(.green)
                          .autocapitalization(.none)
                          .autocorrectionDisabled()
                          .keyboardType(.asciiCapable)
                          .focused($isFocused)
                          .onSubmit {
                              let cmd = inputText
                              inputText = ""
                              session.sendCommand(cmd)
                          }

                      // Send button
                      Button(action: {
                          let cmd = inputText
                          inputText = ""
                          session.sendCommand(cmd)
                      }) {
                          Image(systemName: "return")
                              .foregroundColor(.green)
                              .font(.system(size: 14))
                              .padding(.horizontal, 12)
                      }
                  }
                  .frame(height: 44)
                  .background(Color(white: 0.08))
                  .overlay(Divider().background(Color(white: 0.2)), alignment: .top)
                  .onAppear { isFocused = true }
              }
          }

          struct KeyboardToolbar: View {
              @ObservedObject var session: ShellSession

              private let keys: [(label: String, value: String, color: Color)] = [
                  ("Tab",  "\t",       .yellow),
                  ("↑",    "__UP__",   .cyan),
                  ("↓",    "__DOWN__", .cyan),
                  ("Ctrl+C", "\u{03}", .red),
                  ("Ctrl+D", "\u{04}", .orange),
                  ("Ctrl+Z", "\u{1A}", .purple),
                  ("Ctrl+L", "\u{0C}", .blue),
                  ("ESC",  "\u{1B}",   .gray),
              ]

              var body: some View {
                  ScrollView(.horizontal, showsIndicators: false) {
                      HStack(spacing: 6) {
                          ForEach(keys, id: \.label) { key in
                              Button(action: {
                                  if key.value == "__UP__" {
                                      session.historyUp()
                                  } else if key.value == "__DOWN__" {
                                      session.historyDown()
                                  } else {
                                      session.sendRaw(key.value)
                                  }
                              }) {
                                  Text(key.label)
                                      .font(.system(size: 11, weight: .medium, design: .monospaced))
                                      .foregroundColor(key.color)
                                      .padding(.horizontal, 10)
                                      .padding(.vertical, 5)
                                      .background(key.color.opacity(0.12))
                                      .cornerRadius(5)
                                      .overlay(RoundedRectangle(cornerRadius: 5)
                                          .stroke(key.color.opacity(0.3), lineWidth: 0.5))
                              }
                          }
                      }
                      .padding(.horizontal, 8)
                      .padding(.vertical, 6)
                  }
                  .background(Color(white: 0.09))
                  .overlay(Divider().background(Color(white: 0.15)), alignment: .top)
              }
          }
          SWIFT_END

      - name: 📝 Generate Swift Source — ANSIParser.swift
        run: |
          cat > iLinux/iLinux/Sources/ANSIParser.swift << 'SWIFT_END'
          import UIKit
          import SwiftUI

          // ─── Data Models ───────────────────────────────

          struct TextSegment {
              var text:  String
              var color: Color
              var bold:  Bool
          }

          struct TerminalLine {
              var segments: [TextSegment]
          }

          // ─── ANSI Color Table ───────────────────────────

          private let ansiColorTable: [Int: Color] = [
              0:  .black,
              1:  Color(red: 0.82, green: 0.18, blue: 0.18),
              2:  Color(red: 0.16, green: 0.82, blue: 0.27),
              3:  Color(red: 0.96, green: 0.84, blue: 0.18),
              4:  Color(red: 0.28, green: 0.46, blue: 0.96),
              5:  Color(red: 0.82, green: 0.28, blue: 0.82),
              6:  Color(red: 0.22, green: 0.82, blue: 0.82),
              7:  .white,
              8:  .gray,
              9:  Color(red: 1,    green: 0.4,  blue: 0.4),
              10: Color(red: 0.4,  green: 1,    blue: 0.5),
              11: Color(red: 1,    green: 1,    blue: 0.5),
              12: Color(red: 0.5,  green: 0.65, blue: 1),
              13: Color(red: 1,    green: 0.5,  blue: 1),
              14: Color(red: 0.5,  green: 1,    blue: 1),
              15: .white,
          ]

          // ─── Parser ─────────────────────────────────────

          class ANSIParser {
              private var currentColor: Color  = .white
              private var currentBold:  Bool   = false
              private var buffer:       String = ""

              /// Feed raw bytes and get back complete TerminalLines
              func feed(_ raw: String) -> [TerminalLine] {
                  buffer += raw
                  var result: [TerminalLine] = []

                  while let newline = buffer.firstIndex(of: "\n") {
                      let lineStr = String(buffer[buffer.startIndex..<newline])
                      buffer = String(buffer[buffer.index(after: newline)...])
                      result.append(parseLine(lineStr))
                  }
                  return result
              }

              /// Force-flush remaining buffer as one line
              func flush() -> TerminalLine? {
                  guard !buffer.isEmpty else { return nil }
                  let line = parseLine(buffer)
                  buffer = ""
                  return line
              }

              // ── Internal ──

              private func parseLine(_ raw: String) -> TerminalLine {
                  var segments: [TextSegment] = []
                  var current  = ""
                  var color    = currentColor
                  var bold     = currentBold
                  var i        = raw.startIndex

                  while i < raw.endIndex {
                      let ch = raw[i]

                      // ESC sequence
                      if ch == "\u{1B}", raw.index(after: i) < raw.endIndex, raw[raw.index(after: i)] == "[" {
                          if !current.isEmpty {
                              segments.append(TextSegment(text: current, color: color, bold: bold))
                              current = ""
                          }
                          i = raw.index(i, offsetBy: 2)
                          var seq = ""
                          while i < raw.endIndex {
                              let sc = raw[i]
                              i = raw.index(after: i)
                              if sc.isLetter {
                                  if sc == "m" { applyCSI(seq, &color, &bold) }
                                  break
                              }
                              seq.append(sc)
                          }
                          continue
                      }

                      // Carriage return — reset line
                      if ch == "\r" {
                          segments.removeAll()
                          current = ""
                          i = raw.index(after: i)
                          continue
                      }

                      // Backspace
                      if ch == "\u{08}" {
                          if !current.isEmpty { current.removeLast() }
                          i = raw.index(after: i)
                          continue
                      }

                      current.append(ch)
                      i = raw.index(after: i)
                  }

                  if !current.isEmpty {
                      segments.append(TextSegment(text: current, color: color, bold: bold))
                  }

                  currentColor = color
                  currentBold  = bold
                  return TerminalLine(segments: segments)
              }

              private func applyCSI(_ seq: String, _ color: inout Color, _ bold: inout Bool) {
                  let codes = seq.split(separator: ";").compactMap { Int($0) }
                  if codes.isEmpty {
                      color = .white; bold = false; return
                  }
                  var idx = 0
                  while idx < codes.count {
                      let c = codes[idx]
                      switch c {
                      case 0:  color = .white; bold = false
                      case 1:  bold = true
                      case 2:  bold = false
                      case 22: bold = false
                      case 30...37: color = ansiColorTable[c - 30] ?? .white
                      case 38:
                          if idx + 2 < codes.count, codes[idx+1] == 5 {
                              color = color256(codes[idx+2]); idx += 2
                          }
                      case 39: color = .white
                      case 90...97: color = ansiColorTable[c - 90 + 8] ?? .gray
                      default: break
                      }
                      idx += 1
                  }
              }

              private func color256(_ n: Int) -> Color {
                  if n < 16 { return ansiColorTable[n] ?? .white }
                  if n < 232 {
                      let idx = n - 16
                      let b = idx % 6; let g = (idx / 6) % 6; let r = idx / 36
                      return Color(red: Double(r)/5, green: Double(g)/5, blue: Double(b)/5)
                  }
                  let grey = Double(n - 232) / 23.0
                  return Color(white: grey)
              }
          }
          SWIFT_END

      - name: 📝 Generate Swift Source — LinuxEnvironment.swift
        run: |
          cat > iLinux/iLinux/Sources/LinuxEnvironment.swift << 'SWIFT_END'
          import Foundation

          /// Sets up the Alpine Linux rootfs inside the app's Documents directory
          class LinuxEnvironment {
              let docsDir:   URL
              let alpineRoot: URL
              let binDir:    URL

              init() {
                  docsDir    = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0]
                  alpineRoot = docsDir.appendingPathComponent("alpine_root")
                  binDir     = alpineRoot.appendingPathComponent("bin")
              }

              // MARK: — Public

              func setup(completion: @escaping (Bool) -> Void) {
                  DispatchQueue.global(qos: .userInitiated).async {
                      do {
                          try self.createDirectories()
                          self.extractRootfsIfNeeded()
                          self.writeConfigFiles()
                          self.writeHelperScript()
                          completion(true)
                      } catch {
                          completion(false)
                      }
                  }
              }

              var shellPath: String {
                  // Prefer bundled ash; fall back to system sh
                  let bundledSh = alpineRoot.appendingPathComponent("bin/busybox").path
                  if FileManager.default.isExecutableFile(atPath: bundledSh) {
                      return bundledSh
                  }
                  return "/bin/sh"
              }

              func buildEnvironment() -> [String: String] {
                  [
                      "HOME":    alpineRoot.appendingPathComponent("root").path,
                      "USER":    "root",
                      "LOGNAME": "root",
                      "TERM":    "xterm-256color",
                      "SHELL":   "/bin/sh",
                      "PATH":    "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
                      "PWD":     alpineRoot.appendingPathComponent("root").path,
                      "TMPDIR":  alpineRoot.appendingPathComponent("tmp").path,
                      "LANG":    "en_US.UTF-8",
                      "PS1":     "\\[\\033[1;32m\\]iLinux\\[\\033[0m\\]:\\[\\033[1;34m\\]\\w\\[\\033[0m\\]# ",
                      "ALPINE_ROOT": alpineRoot.path,
                  ]
              }

              // MARK: — Private

              private func createDirectories() throws {
                  let fm = FileManager.default
                  let dirs = [
                      "", "bin", "sbin", "usr/bin", "usr/sbin", "usr/local/bin",
                      "etc", "etc/apk", "etc/profile.d",
                      "root", "home/user",
                      "tmp", "var", "var/cache/apk", "var/log",
                      "lib", "usr/lib", "usr/share",
                      "proc", "sys", "dev"
                  ]
                  for d in dirs {
                      let url = alpineRoot.appendingPathComponent(d)
                      try fm.createDirectory(at: url, withIntermediateDirectories: true)
                  }
              }

              private func extractRootfsIfNeeded() {
                  let flag = alpineRoot.appendingPathComponent(".setup_complete")
                  guard !FileManager.default.fileExists(atPath: flag.path) else { return }

                  // Extract bundled tar.gz
                  if let src = Bundle.main.url(forResource: "alpine_rootfs", withExtension: "tar.gz") {
                      let p = Process()
                      p.executableURL = URL(fileURLWithPath: "/usr/bin/tar")
                      p.arguments = ["-xzf", src.path, "-C", alpineRoot.path, "--strip-components=0"]
                      try? p.run(); p.waitUntilExit()
                  }

                  // Mark done
                  FileManager.default.createFile(atPath: flag.path, contents: nil)
              }

              private func writeConfigFiles() {
                  // /etc/passwd
                  let passwd = "root:x:0:0:root:/root:/bin/sh\nuser:x:1000:1000::/home/user:/bin/sh\n"
                  write(passwd, to: "etc/passwd")

                  // /etc/group
                  write("root:x:0:\nwheel:x:10:root\n", to: "etc/group")

                  // /etc/motd
                  let motd = """
                  ██╗██╗     ██╗███╗   ██╗██╗   ██╗██╗  ██╗
                  ██║██║     ██║████╗  ██║██║   ██║╚██╗██╔╝
                  ██║██║     ██║██╔██╗ ██║██║   ██║ ╚███╔╝
                  ██║██║     ██║██║╚██╗██║██║   ██║ ██╔██╗
                  ██║███████╗██║██║ ╚████║╚██████╔╝██╔╝ ██╗
                  ╚═╝╚══════╝╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚═╝  ╚═╝
                  Alpine Linux 3.19.1  |  arm64  |  iLinux 1.0
                  ────────────────────────────────────────────
                  """
                  write(motd, to: "etc/motd")

                  // /etc/profile
                  let profile = """
                  export HOME=/root
                  export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
                  export TERM=xterm-256color
                  export PS1='\\[\\033[1;32m\\][iLinux]\\[\\033[0m\\] \\[\\033[1;34m\\]\\w\\[\\033[0m\\] # '
                  export LANG=en_US.UTF-8

                  alias ls='ls --color=auto'
                  alias ll='ls -la'
                  alias la='ls -A'
                  alias grep='grep --color=auto'
                  alias ..='cd ..'
                  alias ...='cd ../..'

                  cat /etc/motd
                  """
                  write(profile, to: "etc/profile")

                  // /etc/apk/repositories
                  write("https://dl-cdn.alpinelinux.org/alpine/v3.19/main\nhttps://dl-cdn.alpinelinux.org/alpine/v3.19/community\n", to: "etc/apk/repositories")
              }

              private func writeHelperScript() {
                  // A wrapper shell script so the app launches nicely
                  let rc = """
                  #!/bin/sh
                  . /etc/profile 2>/dev/null
                  echo ""
                  echo "\\033[1;32mWelcome to iLinux!\\033[0m"
                  echo "Type 'uname -a' or 'ls /' to explore."
                  echo ""
                  exec /bin/sh
                  """
                  let path = alpineRoot.appendingPathComponent("root/.ilinuxrc")
                  write(rc, to: "root/.ilinuxrc")
                  try? FileManager.default.setAttributes(
                      [.posixPermissions: 0o755],
                      ofItemAtPath: path.path
                  )
              }

              private func write(_ content: String, to relative: String) {
                  let url = alpineRoot.appendingPathComponent(relative)
                  try? content.write(to: url, atomically: true, encoding: .utf8)
              }
          }
          SWIFT_END

      - name: 📝 Generate Swift Source — ShellSession.swift
        run: |
          cat > iLinux/iLinux/Sources/ShellSession.swift << 'SWIFT_END'
          import Foundation
          import SwiftUI

          @MainActor
          class ShellSession: ObservableObject {
              @Published var lines:     [TerminalLine] = []
              @Published var isRunning: Bool = false

              private let parser = ANSIParser()
              private var env:    LinuxEnvironment?
              private var process: Process?
              private var stdinPipe:  Pipe?
              private var stdoutPipe: Pipe?
              private var history: [String] = []
              private var historyIndex: Int  = -1

              // MARK: — Lifecycle

              func start() {
                  env = LinuxEnvironment()
                  appendSystem("🚀 Setting up Alpine Linux environment...")
                  env?.setup { [weak self] success in
                      Task { @MainActor in
                          if success {
                              self?.appendSystem("✅ Alpine Linux 3.19.1 ready (arm64)")
                              self?.appendSystem("────────────────────────────────────────")
                          } else {
                              self?.appendSystem("⚠️  Setup partial — starting shell anyway")
                          }
                          self?.launchShell()
                      }
                  }
              }

              // MARK: — Shell Launch

              private func launchShell() {
                  guard let env else { return }

                  let proc = Process()
                  let inPipe  = Pipe()
                  let outPipe = Pipe()

                  stdinPipe  = inPipe
                  stdoutPipe = outPipe
                  process    = proc

                  proc.executableURL = URL(fileURLWithPath: "/bin/sh")
                  proc.arguments = ["-l"] // login shell loads /etc/profile

                  // Build environment dictionary
                  var envDict = env.buildEnvironment()
                  // Merge with current process env selectively
                  for key in ["TMPDIR", "HOME"] {
                      if let v = ProcessInfo.processInfo.environment[key], envDict[key] == nil {
                          envDict[key] = v
                      }
                  }
                  proc.environment = envDict

                  proc.standardInput  = inPipe
                  proc.standardOutput = outPipe
                  proc.standardError  = outPipe

                  // Set working directory to Alpine root
                  proc.currentDirectoryURL = URL(fileURLWithPath: env.alpineRoot.path)

                  proc.terminationHandler = { [weak self] _ in
                      Task { @MainActor in
                          self?.isRunning = false
                          self?.appendSystem("\n[Process terminated. Tap ↺ to restart.]")
                      }
                  }

                  do {
                      try proc.run()
                      isRunning = true
                      startReading(pipe: outPipe)
                  } catch {
                      appendSystem("❌ Failed to launch shell: \(error.localizedDescription)")
                      appendSystem("   Trying fallback /bin/sh...")
                      launchFallback()
                  }
              }

              private func launchFallback() {
                  let proc = Process()
                  let inPipe  = Pipe()
                  let outPipe = Pipe()
                  stdinPipe   = inPipe
                  stdoutPipe  = outPipe
                  process     = proc

                  proc.executableURL    = URL(fileURLWithPath: "/bin/sh")
                  proc.standardInput    = inPipe
                  proc.standardOutput   = outPipe
                  proc.standardError    = outPipe
                  proc.environment      = ["TERM": "xterm-256color", "HOME": NSHomeDirectory(), "PATH": "/usr/bin:/bin:/usr/sbin:/sbin"]

                  try? proc.run()
                  isRunning = true
                  startReading(pipe: outPipe)
              }

              // MARK: — I/O

              private func startReading(pipe: Pipe) {
                  pipe.fileHandleForReading.readabilityHandler = { [weak self] fh in
                      let data = fh.availableData
                      guard !data.isEmpty, let str = String(data: data, encoding: .utf8) else { return }
                      Task { @MainActor in
                          self?.handleOutput(str)
                      }
                  }
              }

              private func handleOutput(_ raw: String) {
                  let newLines = parser.feed(raw)
                  lines.append(contentsOf: newLines)
                  // Scrollback limit
                  if lines.count > 3000 { lines.removeFirst(lines.count - 3000) }
              }

              func sendCommand(_ cmd: String) {
                  guard isRunning else { return }
                  if !cmd.isEmpty {
                      history.append(cmd)
                      historyIndex = history.count
                  }
                  sendRaw(cmd + "\n")
              }

              func sendRaw(_ raw: String) {
                  guard let pipe = stdinPipe, isRunning else { return }
                  if let data = raw.data(using: .utf8) {
                      pipe.fileHandleForWriting.write(data)
                  }
              }

              func historyUp() {
                  guard !history.isEmpty else { return }
                  historyIndex = max(0, historyIndex - 1)
                  // Notify UI to update input — simplified via notification
              }

              func historyDown() {
                  historyIndex = min(history.count, historyIndex + 1)
              }

              // MARK: — Helpers

              private func appendSystem(_ msg: String) {
                  let color: Color = msg.hasPrefix("❌") ? .red :
                                     msg.hasPrefix("⚠️") ? .yellow :
                                     msg.hasPrefix("✅") ? .green : Color(white: 0.5)
                  lines.append(TerminalLine(segments: [TextSegment(text: msg, color: color, bold: false)]))
              }
          }
          SWIFT_END

      # ─────────────────────────────────────────────
      # STEP 6: Generate Assets & Info.plist
      # ─────────────────────────────────────────────
      - name: 🎨 Generate Assets & Info.plist
        run: |
          # ── AccentColor ──
          cat > iLinux/iLinux/Assets.xcassets/AccentColor.colorset/Contents.json << 'JSON_END'
          {
            "colors": [{
              "color": {
                "color-space": "srgb",
                "components": {"red":"0.196","green":"0.843","blue":"0.294","alpha":"1.000"}
              },
              "idiom": "universal"
            }],
            "info": {"author":"xcode","version":1}
          }
          JSON_END

          # ── AppIcon Contents ──
          cat > iLinux/iLinux/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON_END'
          {
            "images": [
              {"idiom":"universal","platform":"ios","size":"1024x1024","scale":"1x","filename":"AppIcon.png"}
            ],
            "info": {"author":"xcode","version":1}
          }
          JSON_END

          # ── Assets root Contents ──
          cat > iLinux/iLinux/Assets.xcassets/Contents.json << 'JSON_END'
          {"info":{"author":"xcode","version":1}}
          JSON_END

          # ── Generate AppIcon using Python (Pillow) ──
          pip3 install pillow --quiet --break-system-packages 2>/dev/null || true

          python3 << 'PY_END'
          try:
              from PIL import Image, ImageDraw
              img = Image.new('RGB', (1024, 1024), (0, 12, 0))
              d = ImageDraw.Draw(img)
              # Terminal window background
              d.rounded_rectangle([60, 60, 964, 964], radius=120, fill=(10, 10, 10))
              # Title bar
              d.rounded_rectangle([60, 60, 964, 180], radius=120, fill=(28, 28, 28))
              # Window buttons
              d.ellipse([100, 95, 140, 135], fill=(255, 70, 70))
              d.ellipse([155, 95, 195, 135], fill=(255, 185, 0))
              d.ellipse([210, 95, 250, 135], fill=(0, 200, 60))
              # Code lines
              colors = [(0,255,80),(0,200,60),(150,255,150),(100,200,100),(0,255,80)]
              widths = [400,300,500,350,250]
              for i,(c,w) in enumerate(zip(colors,widths)):
                  y = 240 + i*130
                  d.rounded_rectangle([100,y,100+w,y+55], radius=8, fill=c)
              # Prompt symbol
              d.polygon([(100,780),(150,810),(100,840)], fill=(0,255,80))
              # Alpine leaf hint
              d.ellipse([750,700,950,900], fill=(0,60,0))
              d.ellipse([800,650,980,850], fill=(0,40,0))
              img.save('iLinux/iLinux/Assets.xcassets/AppIcon.appiconset/AppIcon.png')
              print('AppIcon generated ✅')
          except Exception as e:
              print(f'Pillow failed ({e}), using fallback')
              # Minimal PNG fallback (valid 1024x1024 green square)
              import struct, zlib
              def make_png(w, h, rgb):
                  raw = b''.join(b'\x00' + bytes(rgb)*w for _ in range(h))
                  def chunk(t, d):
                      c = zlib.crc32(t+d) & 0xffffffff
                      return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
                  ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
                  idat = zlib.compress(raw)
                  return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
              with open('iLinux/iLinux/Assets.xcassets/AppIcon.appiconset/AppIcon.png','wb') as f:
                  f.write(make_png(1024,1024,(0,100,30)))
          PY_END

          # ── Info.plist ──
          cat > iLinux/iLinux/Info.plist << 'PLIST_END'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
              "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDisplayName</key>
              <string>iLinux</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>NSSupportsLiveActivities</key>
              <false/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
              <key>UILaunchScreen</key>
              <dict>
                  <key>UIColorName</key>
                  <string>AccentColor</string>
              </dict>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIStatusBarStyle</key>
              <string>UIStatusBarStyleLightContent</string>
              <key>ITSAppUsesNonExemptEncryption</key>
              <false/>
          </dict>
          </plist>
          PLIST_END

          echo "✅ Assets and Info.plist generated"

      # ─────────────────────────────────────────────
      # STEP 7: Download Alpine Linux rootfs
      # ─────────────────────────────────────────────
      - name: 🐧 Download Alpine Linux ARM64 Mini Rootfs
        run: |
          ALPINE_VER="3.19.1"
          URL="https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-${ALPINE_VER}-aarch64.tar.gz"
          echo "⬇️  Downloading Alpine Linux ${ALPINE_VER} (aarch64)..."
          curl -L --retry 5 --retry-delay 3 --retry-max-time 120 \
               -o "iLinux/iLinux/Resources/alpine_rootfs.tar.gz" \
               "$URL"
          ls -lh iLinux/iLinux/Resources/alpine_rootfs.tar.gz
          echo "✅ Alpine Linux rootfs downloaded"

      # ─────────────────────────────────────────────
      # STEP 8: Generate Xcode project via Ruby
      # ─────────────────────────────────────────────
      - name: 🏗️ Generate Xcode Project (xcodeproj gem)
        run: |
          cat > gen_project.rb << 'RUBY_END'
          require 'xcodeproj'

          PROJ_NAME = 'iLinux'
          BUNDLE_ID = 'com.ilinux.alpineterminal'
          DEPL_TGT  = '16.0'
          PROJ_DIR  = 'iLinux'
          SRC_DIR   = 'iLinux/Sources'
          RES_DIR   = 'iLinux/Resources'

          # ── Create project ──────────────────────────
          project = Xcodeproj::Project.new("#{PROJ_DIR}/#{PROJ_NAME}.xcodeproj")

          # ── Target ─────────────────────────────────
          target = project.new_target(:application, PROJ_NAME, :ios, DEPL_TGT)

          # ── Groups ─────────────────────────────────
          app_group = project.main_group.new_group(PROJ_NAME, PROJ_NAME)
          src_group  = app_group.new_group('Sources',   'Sources')
          res_group  = app_group.new_group('Resources', 'Resources')

          # ── Swift Sources ───────────────────────────
          swift_files = Dir["#{PROJ_DIR}/#{SRC_DIR}/*.swift"].sort
          swift_files.each do |full_path|
            fname = File.basename(full_path)
            ref   = src_group.new_file("Sources/#{fname}")
            target.source_build_phase.add_file_reference(ref)
          end
          puts "Added #{swift_files.size} Swift source files"

          # ── Info.plist ──────────────────────────────
          plist_ref = app_group.new_file('Info.plist')

          # ── Assets.xcassets ─────────────────────────
          assets_ref = app_group.new_file('Assets.xcassets')
          target.resources_build_phase.add_file_reference(assets_ref)

          # ── Alpine rootfs ───────────────────────────
          rootfs_ref = res_group.new_file('Resources/alpine_rootfs.tar.gz')
          target.resources_build_phase.add_file_reference(rootfs_ref)

          # ── Build Configurations ────────────────────
          ['Debug', 'Release'].each do |config_name|
            config = target.build_configurations.find { |c| c.name == config_name }
            next unless config

            config.build_settings.merge!({
              'PRODUCT_BUNDLE_IDENTIFIER'           => BUNDLE_ID,
              'SWIFT_VERSION'                       => '5.9',
              'IPHONEOS_DEPLOYMENT_TARGET'          => DEPL_TGT,
              'INFOPLIST_FILE'                      => "$(SRCROOT)/#{PROJ_NAME}/Info.plist",
              'TARGETED_DEVICE_FAMILY'              => '1',         # iPhone only
              'CODE_SIGN_STYLE'                     => 'Manual',
              'CODE_SIGNING_REQUIRED'               => 'NO',
              'CODE_SIGNING_ALLOWED'                => 'NO',
              'CODE_SIGN_IDENTITY'                  => '',
              'DEVELOPMENT_TEAM'                    => '',
              'ENABLE_BITCODE'                      => 'NO',
              'ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES' => 'YES',
              'SDKROOT'                             => 'iphoneos',
              'SWIFT_OPTIMIZATION_LEVEL'            => config_name == 'Debug' ? '-Onone' : '-O',
              'SWIFT_COMPILATION_MODE'              => config_name == 'Debug' ? 'singlefile' : 'wholemodule',
              'COPY_PHASE_STRIP'                    => 'NO',
              'ASSETCATALOG_COMPILER_APPICON_NAME'  => 'AppIcon',
              'ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME' => 'AccentColor',
              'MARKETING_VERSION'                   => '1.0.0',
              'CURRENT_PROJECT_VERSION'             => '1',
              'GENERATE_INFOPLIST_FILE'             => 'NO',
            })
          end

          # Project-level settings
          project.build_configurations.each do |config|
            config.build_settings.merge!({
              'IPHONEOS_DEPLOYMENT_TARGET' => DEPL_TGT,
              'SWIFT_VERSION'             => '5.9',
            })
          end

          project.save
          puts "✅ Xcode project saved: #{PROJ_DIR}/#{PROJ_NAME}.xcodeproj"
          RUBY_END

          ruby gen_project.rb

          echo ""
          echo "── Project Structure ──"
          find iLinux -name "*.swift" -o -name "*.plist" -o -name "*.xcodeproj" | sort
          echo ""

      # ─────────────────────────────────────────────
      # STEP 9: Build
      # ─────────────────────────────────────────────
      - name: 🔨 Build App (xcodebuild)
        run: |
          cd iLinux
          BUILD_DIR="$(pwd)/build/Release-iphoneos"
          mkdir -p "$BUILD_DIR"

          xcodebuild \
            -project iLinux.xcodeproj \
            -scheme iLinux \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            clean build \
            2>&1 | grep -E "(error:|warning:|BUILD|Compile|Link|Copy|\.swift)" | tail -80

          echo ""
          echo "── Build Output ──"
          ls -lh "$BUILD_DIR"/ 2>/dev/null
          APP=$(find "$BUILD_DIR" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app not found — printing full log:"
            xcodebuild \
              -project iLinux.xcodeproj \
              -scheme iLinux \
              -configuration Release \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_BITCODE=NO \
              build 2>&1 | tail -120
            exit 1
          fi
          echo "✅ App built: $APP"

      # ─────────────────────────────────────────────
      # STEP 10: Package IPA
      # ─────────────────────────────────────────────
      - name: 📦 Package IPA for Sideloading
        run: |
          cd iLinux
          BUILD_DIR="$(pwd)/build/Release-iphoneos"
          APP=$(find "$BUILD_DIR" -name "*.app" -maxdepth 1 | head -1)

          echo "📱 Packaging: $APP"
          rm -rf Payload
          mkdir Payload
          cp -r "$APP" Payload/iLinux.app

          # Remove any existing code signatures (for clean sideloading)
          codesign --remove-signature "Payload/iLinux.app" 2>/dev/null || true
          find "Payload/iLinux.app/Frameworks" -name "*.dylib" -o -name "*.framework" 2>/dev/null | \
            xargs -I{} codesign --remove-signature {} 2>/dev/null || true

          zip -r iLinux.ipa Payload/ -x "*.DS_Store"

          echo ""
          ls -lh iLinux.ipa
          echo "✅ IPA ready: $(pwd)/iLinux.ipa"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📲 SIDELOAD INSTRUCTIONS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  1. Download iLinux.ipa from Artifacts"
          echo "  2. Use AltStore / Sideloadly / TrollStore"
          echo "     to install on your iPhone 15 Pro Max"
          echo "  3. Trust the developer certificate in:"
          echo "     Settings → General → VPN & Device Mgmt"
          echo "  4. Open iLinux → Alpine Linux starts!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ─────────────────────────────────────────────
      # STEP 11: Upload artifact
      # ─────────────────────────────────────────────
      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iLinux-Alpine-IPA
          path: iLinux/iLinux.ipa
          retention-days: 30
          if-no-files-found: error

      # ─────────────────────────────────────────────
      # STEP 12: Summary
      # ─────────────────────────────────────────────
      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 🐧 iLinux Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | iLinux — Alpine Terminal |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | com.ilinux.alpineterminal |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | Alpine Linux 3.19.1 (aarch64) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | iPhone 15 Pro Max (iOS 16+) |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | None (Sideload-ready) |" >> $GITHUB_STEP_SUMMARY
          echo "| Install | AltStore / Sideloadly / TrollStore |" >> $GITHUB_STEP_SUMMARY
          if [ -f iLinux/iLinux.ipa ]; then
            SIZE=$(du -sh iLinux/iLinux.ipa | cut -f1)
            echo "| IPA Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Build SUCCEEDED** — IPA uploaded to Artifacts" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Build FAILED** — Check logs above" >> $GITHUB_STEP_SUMMARY
          fi
