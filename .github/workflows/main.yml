name: Build Linux IPA (iSH-based)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install build dependencies
        run: |
          brew install meson ninja libarchive cmake pkg-config

      - name: Prepare Alpine Linux filesystem
        run: |
          mkdir -p alpine_fs
          curl -L -o alpine-minirootfs.tar.gz \
            https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-minirootfs-3.20.3-x86_64.tar.gz
          
          # Extract to fake filesystem for iSH
          sudo tar -xzf alpine-minirootfs.tar.gz -C alpine_fs
          echo "Alpine FS prepared"

      - name: Build iSH
        run: |
          # যদি তোমার প্রজেক্টে meson build সেটআপ থাকে
          meson setup build --buildtype=release \
            -Dbuild-for=iphoneos \
            --prefix=/usr/local
          
          meson compile -C build
          meson install -C build

      - name: Xcode Archive & Export IPA
        run: |
          xcodebuild clean archive \
            -project iSH.xcodeproj \
            -scheme iSH \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/output"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-iPhone-IPA
          path: ${{ runner.temp }}/output/*.ipa
