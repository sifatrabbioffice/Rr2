name: Build Linux IPA (iSH)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout iSH with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive   # খুব জরুরি!

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'   # অথবা latest

      - name: Install dependencies
        run: |
          brew install meson ninja libarchive

      - name: Prepare Alpine rootfs (optional pre-bundle)
        run: |
          mkdir -p $RUNNER_TEMP/alpine_fs
          curl -L -o alpine.tar.gz \
            https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-minirootfs-3.20.3-x86_64.tar.gz
          sudo tar -xzf alpine.tar.gz -C $RUNNER_TEMP/alpine_fs
          echo "✅ Alpine FS prepared"

      - name: Build & Archive with Xcode
        run: |
          # iSH প্রজেক্টের নিজস্ব স্ক্রিপ্ট চালানোর চেষ্টা
          if [ -f "scripts/build.sh" ] || [ -f "xcode-meson.sh" ]; then
            echo "Custom build script found"
          fi

          xcodebuild clean archive \
            -project iSH.xcodeproj \
            -scheme iSH \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/output" \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iSH-Linux-IPA
          path: ${{ runner.temp }}/output/*.ipa
