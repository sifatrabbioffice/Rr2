name: Build Linux IPA (iSH-like)

on:
  workflow_dispatch:  # ম্যানুয়ালি রান করতে
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # iSH-এর জন্য জরুরি

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'  # বা latest

      - name: Install dependencies
        run: |
          brew install python3 meson ninja libarchive
          pip3 install meson

      - name: Prepare Alpine Linux FS (pre-embed or download)
        run: |
          # Alpine minirootfs ডাউনলোড + fakefsify (iSH tools)
          curl -L -o alpine.tar.gz https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86/alpine-minirootfs-3.20.0-x86.tar.gz
          # iSH tools দিয়ে প্রসেস করো (তোমার repo-এ tools/fakefsify আছে)
          cd tools && ./fakefsify ../alpine.tar.gz ../alpine_fs || echo "FS prepare করো"

      - name: Build iSH
        run: |
          # Xcode build
          xcodebuild clean archive \
            -project iSH.xcodeproj \
            -scheme iSH \
            -archivePath $RUNNER_TEMP/iSH.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iSH.xcarchive \
            -exportOptionsPlist ./ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Linux-IPA
          path: ${{ runner.temp }}/build/*.ipa
